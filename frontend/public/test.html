<!DOCTYPE html>
<html>
<head>
    <title>AutoPoV Diagnostics</title>
</head>
<body>
    <h1>AutoPoV Diagnostics</h1>
    <h2>LocalStorage Contents:</h2>
    <pre id="localstorage"></pre>
    
    <h2>Test API Key:</h2>
    <input type="text" id="apiKeyInput" placeholder="Enter API key" style="width: 400px;">
    <button onclick="saveKey()">Save to LocalStorage</button>
    <button onclick="testApi()">Test API</button>
    
    <h2>Test Result:</h2>
    <pre id="result"></pre>
    
    <script>
        // Display localStorage contents
        function updateDisplay() {
            const apiKey = localStorage.getItem('autopov_api_key');
            document.getElementById('localstorage').textContent = 
                'autopov_api_key: ' + (apiKey ? apiKey.substring(0, 20) + '...' : 'NOT SET');
            document.getElementById('apiKeyInput').value = apiKey || '';
        }
        
        function saveKey() {
            const key = document.getElementById('apiKeyInput').value;
            localStorage.setItem('autopov_api_key', key);
            updateDisplay();
            alert('API Key saved!');
        }
        
        async function testApi() {
            const apiKey = localStorage.getItem('autopov_api_key');
            const resultDiv = document.getElementById('result');
            
            if (!apiKey) {
                resultDiv.textContent = 'ERROR: No API key in localStorage';
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/scan/git', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        url: 'https://github.com/AnyaChima1/mary-chima-wedding',
                        branch: 'main'
                    })
                });
                
                const data = await response.json();
                resultDiv.textContent = `Status: ${response.status}\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.textContent = `ERROR: ${error.message}`;
            }
        }
        
        updateDisplay();
    </script>
</body>
</html>
