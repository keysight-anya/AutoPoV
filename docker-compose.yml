services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: autopov-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./.env:/app/.env:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
